services:
  postgres:
    image: postgres:16
    container_name: postgres_northwind
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bass
      POSTGRES_DB: northwind
    ports:
      - "5432:5432"
    volumes:
      - postgres_northwind_data:/var/lib/postgresql/data
      - ./northwind.sql:/docker-entrypoint-initdb.d/northwind.sql

volumes:
  postgres_northwind_data: